<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared/style.css" />
  <link rel="stylesheet" href="shared/style-typo.css" />
  <link rel="stylesheet" href="cases/cases.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-tabs">
      <a href="index.html" class="tab h4">About me</a>
      <a href="cases.html" class="tab h4 active">Gallery</a>
      <a href="products.html" class="tab h4">Products</a>
      <a href="materials.html" class="tab h4">Saved</a>
    </div>
  </nav>

  <main class="main">
    <div id="gallery"></div>
  </main>

  <div class="shot-lightbox" id="shotLightbox">
    <div class="shot-lightbox-slider" id="shotSlider">
      <button class="shot-slider-arrow shot-slider-arrow--up" id="sliderArrowUp">
        <svg width="16" height="8" viewBox="0 0 16 8" fill="none"><path d="M14 7L8 1L2 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="shot-slider-thumbs" id="sliderThumbs"></div>
      <button class="shot-slider-arrow shot-slider-arrow--down" id="sliderArrowDown">
        <svg width="16" height="8" viewBox="0 0 16 8" fill="none"><path d="M2 1L8 7L14 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="shot-slider-scrollbar" id="sliderScrollbar">
        <div class="shot-slider-scrollbar-thumb" id="sliderScrollbarThumb"></div>
      </div>
    </div>
    <div class="shot-lightbox-main">
      <div class="shot-lightbox-media" id="shotLightboxMedia"></div>
      <div class="shot-lightbox-caption" id="shotLightboxCaption"></div>
    </div>
  </div>

  <script src="cases/cases-data.js"></script>
  <script src="cases/cases-render.js"></script>
</body>
</html>
