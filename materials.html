    <aside class="notes-sidebar">

    </aside>

    <article class="note-pane">
      <div class="note-body" id="noteBody"></div>
      <div class="note-backlinks" id="noteBacklinks"></div>
    </article>

    <aside class="notes-graph-pane">
      <p class="notes-sidebar-label">Graph</p>
      <svg id="graphSvg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg"></svg>
    </aside>

  </main>

  <script src="script.js"></script>
  <script>
  const notes = {
    'design-systems': {
      title: 'Design Systems',
      content: `# Design Systems

A design system is a shared language between designers and engineers — a collection of reusable components guided by clear standards.

At [[Wargaming]], maintaining a large-scale system for World of Tanks meant solving for consistency across complex in-game UI while keeping it flexible enough for live-service updates.

## Core layers

- **[[Design Tokens]]** — the values: colors, spacing, typography
- **[[Component Libraries]]** — the building blocks assembled from tokens
- Documentation — the rules for how and when to use them

## Why it matters

Without a system, every screen becomes a negotiation. With one, design and engineering share the same source of truth.

Related: [[UI Design]], [[Color Theory]]`
    },

    'design-tokens': {
      title: 'Design Tokens',
      content: `# Design Tokens

Design tokens are named entities that store visual design decisions — the atoms beneath [[Component Libraries]] and [[Design Systems]].

## Types

- **Color** — see [[Color Theory]] for how to think about palettes
- **Typography** — font size, weight, line height
- **Spacing** — padding, margin, gap scales
- **Radius** — corner rounding values

## Why named values beat hardcoded ones

\`--surface-2: #cccccc\` means something. \`#cccccc\` alone means nothing to the next person reading the code.

Tokens also make theming trivial — swap the values, not the components.`
    },

    'component-libraries': {
      title: 'Component Libraries',
      content: `# Component Libraries

A component library is the implementation layer of a [[Design Systems]]. Where tokens define values, components define structure and behavior.

## In practice

The gap between a Figma component and a coded one is where most inconsistency lives. Bridging it requires both sides to speak the same language — usually through [[Design Tokens]].

## iOS

In [[iOS Development]], SwiftUI ships a component library out of the box. The challenge is extending it without diverging from the system's patterns.

## On the web

Custom systems built on Radix or similar primitives give full control while handling accessibility — the hardest part to get right from scratch.`
    },

    'ios-development': {
      title: 'iOS Development',
      content: `# iOS Development

Picked up [[Swift]] and iOS fundamentals in 2023. Shipped two apps independently — concept to App Store.

## What changed

Coming from [[UI Design]], the shift to code flipped my perspective on [[Component Libraries]]. Suddenly I understood *why* the handoff breaks — and how to prevent it upstream in design.

## Stack

- SwiftUI for UI
- Xcode + TestFlight for distribution
- No third-party dependencies in the first apps — constraints breed clarity

## The loop

Design → prototype → build → observe real usage → back to design. The cycle is faster when one person owns the full stack.`
    },

    'color-theory': {
      title: 'Color Theory',
      content: `# Color Theory

Color is the first thing perceived and the last thing consciously thought about when a UI is working well.

## Contrast

WCAG 2.1 requires a 4.5:1 ratio for normal text. In practice, aiming higher — around 7:1 — makes interfaces readable in harsh lighting conditions on mobile.

## Dark mode

Dark mode isn't an inversion of light mode. It's a separate palette designed for a different ambient context. [[Design Tokens]] make maintaining both scales manageable.

## In [[UI Design]]

Color communicates hierarchy, state, and brand. [[Design Systems]] at scale always formalize color decisions into tokens before anything else — it's the highest-leverage starting point.`
    },

    'ui-design': {
      title: 'UI Design',
      content: `# UI Design

UI design is the craft of making interfaces feel inevitable — where every decision looks obvious in hindsight.

## Core disciplines

- **[[Color Theory]]** — hierarchy, emotion, accessibility
- Typography — readability, personality, scale
- Layout — grid, rhythm, breathing room
- Interaction — feedback, animation, state

## At scale

Individual screens are easy. A coherent product across hundreds of screens requires [[Design Systems]]. The system is the real design artifact.

## The handoff problem

The distance between a pixel-perfect Figma file and a shipped product is where intent gets lost. [[Component Libraries]] and [[Design Tokens]] narrow that gap.`
    },

    'swift': {
      title: 'Swift',
      content: `# Swift

Apple's programming language for [[iOS Development]], macOS, and beyond. Statically typed, expressive, and genuinely enjoyable to write.

## What resonates from a design background

SwiftUI's declarative syntax maps closely to how designers think — describe the desired state, let the framework figure out the transition. It's the same mental model as component-based [[Design Systems]].

## Type safety as a design principle

The compiler refuses to let ambiguity through. That's a form of constraint, and constraint is where good design lives.

## Practical notes

- Preview canvas in Xcode is the closest thing to Figma's instant feedback in code
- SwiftUI animations are remarkably close to Figma Smart Animate in philosophy`
    },

    'wargaming': {
      title: 'Wargaming',
      content: `# Wargaming

UX/UI Designer at Wargaming from 2022 to present. Working on World of Tanks — one of the most played PC games in the world.

## The scale problem

Game UI is a different discipline from product UI. Millions of concurrent users means a bad decision in a single component reverberates widely and is slow to roll back.

## What this shaped

- Deep investment in [[Design Systems]] — consistency at scale is non-negotiable
- Rigorous use of [[Design Tokens]] — every value needs to be justified and named
- Close collaboration with engineers to close the gap between [[Component Libraries]] in Figma and in engine

## The craft

World of Tanks UI has to work in the heat of a battle — read instantly, respond immediately, disappear when not needed. The best [[UI Design]] is the kind players never notice.`
    }
  };

  // Build title → id map
  const titleToId = {};
  Object.entries(notes).forEach(([id, note]) => {
    titleToId[note.title.toLowerCase()] = id;
  });

  // Extract all [[links]] from a note's content
  function extractLinks(content) {
    const matches = content.match(/\[\[([^\]]+)\]\]/g) || [];
    return matches.map(m => m.slice(2, -2));
  }

  // Build backlinks map
  const backlinks = {};
  Object.keys(notes).forEach(id => { backlinks[id] = []; });
  Object.entries(notes).forEach(([fromId, note]) => {
    extractLinks(note.content).forEach(title => {
      const toId = titleToId[title.toLowerCase()];
      if (toId && !backlinks[toId].includes(fromId)) {
        backlinks[toId].push(fromId);
      }
    });
  });

  // Parse markdown → HTML, turning [[links]] into clickable spans
  function parseMarkdown(content) {
    const lines = content.split('\n');
    let html = '';
    let inList = false;

    lines.forEach(line => {
      if (line.startsWith('# ')) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<h1>${renderInline(line.slice(2))}</h1>`;
      } else if (line.startsWith('## ')) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<h2>${renderInline(line.slice(3))}</h2>`;
      } else if (line.startsWith('- ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${renderInline(line.slice(2))}</li>`;
      } else if (line.trim() === '') {
        if (inList) { html += '</ul>'; inList = false; }
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<p>${renderInline(line)}</p>`;
      }
    });
    if (inList) html += '</ul>';
    return html;
  }

  function renderInline(text) {
    // [[wikilinks]]
    text = text.replace(/\[\[([^\]]+)\]\]/g, (_, title) => {
      const id = titleToId[title.toLowerCase()];
      if (id) return `<span class="wikilink" data-id="${id}">${title}</span>`;
      return `<span class="wikilink wikilink--missing">${title}</span>`;
    });
    // **bold**
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // `code`
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    return text;
  }

  let activeId = 'design-systems';

  function openNote(id) {
    if (!notes[id]) return;
    activeId = id;

    // Render content
    const noteBody = document.getElementById('noteBody');
    noteBody.innerHTML = parseMarkdown(notes[id].content);

    // Wikilink clicks
    noteBody.querySelectorAll('.wikilink[data-id]').forEach(el => {
      el.addEventListener('click', () => openNote(el.dataset.id));
    });

    // Backlinks
    const bl = backlinks[id];
    const blEl = document.getElementById('noteBacklinks');
    if (bl.length) {
      blEl.innerHTML = `<p class="backlinks-label">Linked from</p>` +
        bl.map(bid => `<div class="backlink-item" data-id="${bid}">${notes[bid].title}</div>`).join('');
      blEl.querySelectorAll('.backlink-item').forEach(el => {
        el.addEventListener('click', () => openNote(el.dataset.id));
      });
    } else {
      blEl.innerHTML = '';
    }

    // Sidebar active state
    document.querySelectorAll('.notes-list li').forEach(li => {
      li.classList.toggle('active', li.dataset.id === id);
    });

    // Update graph
    renderGraph();

    // Scroll content to top
    document.querySelector('.note-pane').scrollTop = 0;
  }

  // Build sidebar list
  function buildSidebar() {
    const list = document.getElementById('notesList');
    list.innerHTML = Object.entries(notes).map(([id, note]) =>
      `<li data-id="${id}">${note.title}</li>`
    ).join('');
    list.querySelectorAll('li').forEach(li => {
      li.addEventListener('click', () => openNote(li.dataset.id));
    });
  }

  // Graph
  const nodePositions = {};
  const ids = Object.keys(notes);

  function computePositions() {
    const cx = 110, cy = 110, r = 78;
    ids.forEach((id, i) => {
      const angle = (i / ids.length) * Math.PI * 2 - Math.PI / 2;
      nodePositions[id] = { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
    });
  }

  function renderGraph() {
    const svg = document.getElementById('graphSvg');
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
    const surface2 = getComputedStyle(document.documentElement).getPropertyValue('--surface-2').trim();
    const surface = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim();

    // Collect edges (deduplicated)
    const edges = new Set();
    Object.entries(notes).forEach(([fromId, note]) => {
      extractLinks(note.content).forEach(title => {
        const toId = titleToId[title.toLowerCase()];
        if (toId) {
          const key = [fromId, toId].sort().join('|');
          edges.add(key);
        }
      });
    });

    let html = '';

    // Lines
    edges.forEach(key => {
      const [a, b] = key.split('|');
      const pa = nodePositions[a], pb = nodePositions[b];
      if (!pa || !pb) return;
      const isActive = a === activeId || b === activeId;
      html += `<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="${isActive ? surface2 : surface}" stroke-width="${isActive ? 1.5 : 1}" />`;
    });

    // Nodes
    ids.forEach(id => {
      const p = nodePositions[id];
      const isActive = id === activeId;
      const r = isActive ? 5 : 3.5;
      const fill = isActive ? textColor : surface2;
      html += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" class="graph-node" data-id="${id}" style="cursor:pointer" />`;

      // Label for active node only
      if (isActive) {
        const labelX = p.x > 110 ? p.x + 8 : p.x - 8;
        const anchor = p.x > 110 ? 'start' : 'end';
        html += `<text x="${labelX}" y="${p.y + 4}" fill="${textColor}" font-size="8" text-anchor="${anchor}" font-family="Inter, sans-serif">${notes[id].title}</text>`;
      }
    });

    svg.innerHTML = html;

    svg.querySelectorAll('.graph-node').forEach(el => {
      el.addEventListener('click', () => openNote(el.dataset.id));
    });
  }

  computePositions();
  buildSidebar();
  openNote('design-systems');
  </script>
</body>
